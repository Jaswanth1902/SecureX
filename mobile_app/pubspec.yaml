name: secure_print_user
description: SecurePrint - Secure File Printing System Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.5
  riverpod: ^2.6.1
  
  # Networking
  http: ^1.6.0
  dio: ^5.9.0
  connectivity_plus: ^5.0.2
  
  # Navigation
  go_router: ^10.2.0
  
  # Encryption & Security
  encrypt: ^5.0.3
  pointycastle: ^3.9.1
  cryptography: ^2.9.0
  flutter_secure_storage: ^9.2.4
  
  # File Handling
  file_picker: ^8.3.7
  path_provider: ^2.1.5
  
  # Permissions
  permission_handler: ^11.4.0
  
  # Device Info
  device_info_plus: ^10.1.2
  package_info_plus: ^4.2.0
  
  # UI & Animations
  flutter_animate: ^4.5.2
  
  # Storage
  shared_preferences: ^2.5.3
  
  # Utilities
  intl: ^0.19.0
  logger: ^2.6.2
  json_serializable: ^6.11.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  build_runner: ^2.10.4
  mockito: ^5.6.1

flutter:
  uses-material-design: true
  
  # Assets (uncomment and add assets as needed)
  # assets:
  #   - assets/images/
  #   - assets/icons/
